name: Daily GitHub Activity

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without making remote changes"
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  daily-activity:
    runs-on: ubuntu-latest
    environment: GH_PAT
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      OWNER: zakiscoding
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

    steps:
      - name: Configure git identity
        run: |
          git config --global user.email "zakiscoding@users.noreply.github.com"
          git config --global user.name "zakiscoding"
          gh auth setup-git

      - name: Choose rotating repos
        id: seed
        run: |
          REPOS=(zakiscoding Tinker-1 Stackz mysterygame Kash web-programming projects testing wp)
          COUNT=${#REPOS[@]}
          DAY=$((10#$(date +%j)))
          echo "commit_repo=${REPOS[$((DAY % COUNT))]}" >> "$GITHUB_OUTPUT"
          echo "issue_repo=${REPOS[$(((DAY + 1) % COUNT))]}" >> "$GITHUB_OUTPUT"
          echo "pr_repo=${REPOS[$(((DAY + 2) % COUNT))]}" >> "$GITHUB_OUTPUT"

      - name: 1 of 5 - Commit
        run: |
          REPO="${{ steps.seed.outputs.commit_repo }}"
          echo "Commit target: $OWNER/$REPO"
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; skipping commit"
            exit 0
          fi

          rm -rf /tmp/commit-repo
          gh repo clone "$OWNER/$REPO" /tmp/commit-repo
          cd /tmp/commit-repo

          DEFAULT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
          [ -z "$DEFAULT_BRANCH" ] && DEFAULT_BRANCH=main
          git switch "$DEFAULT_BRANCH" || true

          mkdir -p logs
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') daily activity" >> logs/activity.log

          git add logs/activity.log
          git commit -m "chore: update activity log" || echo "Nothing to commit"
          git push origin "$DEFAULT_BRANCH"

      - name: 2 of 5 - Open Issue
        id: issue
        run: |
          REPO="${{ steps.seed.outputs.issue_repo }}"
          echo "Issue target: $OWNER/$REPO"
          if [ "$DRY_RUN" = "true" ]; then
            echo "number=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_URL=$(gh issue create \
            --repo "$OWNER/$REPO" \
            --title "Review input validation and edge cases" \
            --body "Code review follow-up: validate empty input paths and boundary handling.")
          ISSUE_NUM="${ISSUE_URL##*/}"
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: 3 of 5 - Create PR
        id: pr
        run: |
          REPO="${{ steps.seed.outputs.pr_repo }}"
          echo "PR target: $OWNER/$REPO"
          if [ "$DRY_RUN" = "true" ]; then
            echo "number=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf /tmp/pr-repo
          gh repo clone "$OWNER/$REPO" /tmp/pr-repo
          cd /tmp/pr-repo

          DEFAULT_BRANCH=$(git remote show origin | sed -n 's/.*HEAD branch: //p')
          [ -z "$DEFAULT_BRANCH" ] && DEFAULT_BRANCH=main

          if ! git rev-parse HEAD 2>/dev/null; then
            echo "Empty repo — initializing $DEFAULT_BRANCH"
            git switch -c "$DEFAULT_BRANCH"
            touch .gitkeep
            git add .gitkeep
            git commit -m "chore: initial commit"
            git push -u origin "$DEFAULT_BRANCH"
          else
            git switch "$DEFAULT_BRANCH" || true
          fi

          BRANCH="auto/maintenance-$(date +%Y%m%d-%H%M%S)"
          git switch -c "$BRANCH"

          mkdir -p logs
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') pr maintenance" >> logs/pr-notes.log
          git add logs/pr-notes.log
          git commit -m "chore: daily maintenance update"
          git push -u origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo "$OWNER/$REPO" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "chore: daily maintenance update" \
            --body "Automated daily maintenance PR.")
          PR_NUM="${PR_URL##*/}"
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: 4 of 5 - Review PR
        continue-on-error: true
        run: |
          REPO="${{ steps.pr.outputs.repo }}"
          PR_NUM="${{ steps.pr.outputs.number }}"
          if [ "$DRY_RUN" = "true" ] || [ -z "$PR_NUM" ] || [ "$PR_NUM" = "0" ]; then
            echo "No PR review needed"
            exit 0
          fi

          gh pr review "$PR_NUM" \
            --repo "$OWNER/$REPO" \
            --approve \
            --body "Reviewed and approved."

      - name: 5 of 5 - Merge PR
        run: |
          REPO="${{ steps.pr.outputs.repo }}"
          PR_NUM="${{ steps.pr.outputs.number }}"
          if [ "$DRY_RUN" = "true" ] || [ -z "$PR_NUM" ] || [ "$PR_NUM" = "0" ]; then
            echo "No PR merge needed"
            exit 0
          fi

          gh pr merge "$PR_NUM" \
            --repo "$OWNER/$REPO" \
            --squash \
            --delete-branch
